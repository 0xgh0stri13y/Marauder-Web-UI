<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Marauder | Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/control.css">
</head>
<body>
    <nav class="navbar">
        <a href="./" class="nav-link active">Control Center</a>
        <a href="espflasher/" class="nav-link">Firmware Flasher</a>
    </nav>

    <div class="dashboard">
        
        <!-- Row 1: Connection & Terminal -->
        <div class="bento-row grid-top">
            <div class="bento-col anim-1">
                <div class="panel">
                    <div class="panel-title cyan">Connection</div>
                    <div class="connection-box">
                        <div class="status-wrapper" id="status-wrapper">
                            <span class="status-indicator"></span>
                            <span id="status">Not connected</span>
                        </div>
                        <div class="conn-buttons">
                            <button class="btn" id="connect-btn">Connect</button>
                            <button class="btn" id="disconnect-btn" disabled>Disconnect</button>
                        </div>
                    </div>
                </div>
                
                <div class="panel" style="flex-grow: 1;">
                    <div class="panel-title">Helper Commands</div>
                    <div class="btn-grid-large">
                        <button class="action-btn" id="select-ap-btn">Select APs</button>
                        <button class="action-btn" id="select-sta-btn">Select Stations</button>
                        <button class="action-btn" id="generate-ssid-btn">Gen SSIDs</button>
                        <button class="action-btn" id="add-ssid-btn">Add SSID</button>
                        <button class="action-btn" id="clear-select-btn" style="grid-column: span 2; color: var(--accent-red); border-color: rgba(255,42,42,0.2);">Clear All Selections</button>
                    </div>
                </div>
            </div>

            <div class="panel anim-2" style="display: flex; flex-direction: column;">
                <div class="terminal-header">
                    <div class="panel-title" style="margin: 0;">Terminal Output</div>
                    <div class="terminal-controls">
                        <button class="btn-small" id="clear-terminal-btn">Clear</button>
                        <button class="btn-small" id="autoscroll-btn">Auto-scroll: ON</button>
                    </div>
                </div>
                <div id="terminal"></div>
                <input id="command-input" placeholder="Type Marauder command (e.g. scanap, sniffbt, help) and press Enter..." autocomplete="off">
            </div>
        </div>

        <!-- Row 2: Recon & Scanner -->
        <div class="bento-row grid-3">
            <div class="panel anim-3">
                <div class="panel-title cyan">Wi-Fi Recon</div>
                <div class="btn-grid">
                    <button class="action-btn" data-cmd="scanap">Scan APs</button>
                    <button class="action-btn" data-cmd="scansta">Scan Stations</button>
                    <button class="action-btn" data-cmd="scanall">Scan All</button>
                    <button class="action-btn" data-cmd="stopscan">Stop Scan</button>
                    <button class="action-btn" data-cmd="sniffbeacon">Sniff Beacons</button>
                    <button class="action-btn" data-cmd="sniffdeauth">Sniff Deauth</button>
                    <button class="action-btn" data-cmd="sniffpmkid">Sniff PMKID</button>
                    <button class="action-btn" data-cmd="sniffpwn">Sniff PWN</button>
                </div>
                
                <div class="divider"></div>
                
                <div class="subheading cyan">Attacks & Spam</div>
                <div class="btn-grid">
                    <button class="action-btn attack-btn btn-deauth" data-cmd="attack -t deauth">Deauth All</button>
                    <button class="action-btn attack-btn btn-beacon" data-cmd="attack -t beacon">Beacon Spam</button>
                    <button class="action-btn attack-btn btn-beacon" data-cmd="attack -t rickroll">Rickroll</button>
                    <button class="action-btn attack-btn btn-stop" data-cmd="stopattack">Stop Attack</button>
                </div>
            </div>

            <div class="panel anim-4">
                <div class="panel-title purple">Bluetooth Recon</div>
                <div class="btn-grid">
                    <button class="action-btn" data-cmd="scanbt">Scan BT</button>
                    <button class="action-btn" data-cmd="sniffbt">Sniff BT</button>
                    <button class="action-btn" data-cmd="stopscan">Stop Scan</button>
                    <button class="action-btn" style="color: var(--accent-purple); border-color: rgba(180, 0, 255, 0.2);" data-cmd="btspam">BT Spam</button>
                </div>
                
                <div class="divider"></div>
                
                <div class="subheading purple">BLE Devices <span class="tag" id="device-count">0</span></div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>MAC Address</th>
                                <th>Name</th>
                                <th>RSSI</th>
                            </tr>
                        </thead>
                        <tbody id="ble-table-body">
                            <tr><td colspan="3" class="table-empty">No devices</td></tr>
                        </tbody>
                    </table>
                </div>
                <button class="btn-small" id="clear-ble-btn" style="margin-top: 12px; width: fit-content;">Clear List</button>
            </div>

            <div class="panel anim-4">
                <div class="panel-title red">Utility & System</div>
                <div class="btn-grid">
                    <button class="action-btn" data-cmd="help">Show Help</button>
                    <button class="action-btn" data-cmd="info">System Info</button>
                    <button class="action-btn" data-cmd="list">List Files</button>
                    <button class="action-btn" data-cmd="logs">Show Logs</button>
                    <button class="action-btn" data-cmd="reboot">Reboot</button>
                    <button class="action-btn" data-cmd="clearlist -a">Clear APs</button>
                    <button class="action-btn" data-cmd="clearlist -s">Clear Stas</button>
                    <button class="action-btn" data-cmd="update">Update Check</button>
                </div>
                
                <div class="divider"></div>
                
                <div class="subheading red">Advanced Attack</div>
                <div class="btn-grid-large">
                    <button class="action-btn" id="deauth-manual-btn" style="grid-column: span 2;">Manual Deauth Attack</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/control.js"></script>
</body>
</html>
